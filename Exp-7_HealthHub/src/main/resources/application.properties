spring.application.name=HealthHub

# DATABASE CONNECTION SETTINGS
# --------------------------------------------

# JDBC URL used to connect Spring Boot application to MySQL database
# Format: jdbc:mysql://host:port/database_name
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db

# Database username used for authentication


spring.datasource.username=root

# Database password for the above user

spring.datasource.password=Saurabh@8969

# JDBC driver class used to connect to MySQL database

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --------------------------------------------
# JPA / HIBERNATE CONFIGURATION
# --------------------------------------------

# Automatically create or update database tables based on entity classes
# Options:
# create  -> Drops and recreates tables every time application starts
# update  -> Updates schema if changes occur (commonly used in development)
# validate -> Validates schema but does not change database
# none    -> No schema changes
spring.jpa.hibernate.ddl-auto=update


# Show SQL queries executed by Hibernate in console
# Helpful for learning and debugging
spring.jpa.show-sql=true
